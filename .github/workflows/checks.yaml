name: 'checks'
on:
  pull_request:
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main
      with:
        set-safe-directory: true
        fetch-depth: 0
    - run: |
        wget -q https://github.com/WeiDUorg/weidu/releases/download/v249.00/WeiDU-Linux-249-amd64.zip
        unzip WeiDU-Linux-249-amd64.zip
        rm WeiDU-Linux-249-amd64.zip
        sudo mv WeiDU-Linux/weidu /usr/local/bin/weidu
        rm -rf WeiDU-Linux
        wget -q https://github.com/jdx/hk/releases/download/v1.43.0/hk-x86_64-unknown-linux-musl.tar.gz
        tar xvf hk-x86_64-unknown-linux-musl.tar.gz
        sudo mv hk /usr/local/bin/hk
    - run: hk run pre-commit --all
